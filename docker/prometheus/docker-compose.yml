version: '3.8'

services:
  perfmon-exporter:
    image: sieteunoseis/perfmon-prometheus-exporter:latest
    container_name: perfmon-prometheus-exporter
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./data:/usr/src/app/data
    env_file:
      - .env
    command: ["node", "main-prometheus-modular.js"]
    networks:
      - monitoring

  # Optional: Include Prometheus to scrape the exporter
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - monitoring
    depends_on:
      - perfmon-exporter

  # Optional: Include Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - monitoring
    depends_on:
      - prometheus

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data: